# Place this file at .github/workflows/regenerate-catalog.yml in the
# iskra-catalog repo. Triggered by repository_dispatch events from any
# *-firmware repo (see notify-iskra-catalog.yml). Walks every *-firmware repo
# under the account, pulls each repo's latest release + target.json sidecar,
# runs `Iskra.Cli --generate-catalog`, signs with the Ed25519 dev key,
# publishes catalog.json + catalog.json.sig as a release asset.
#
# Required secret in iskra-catalog:
#   CATALOG_PRIV_KEY   base64 of the Ed25519 private key bytes (the contents
#                      of catalog-key.priv). The matching public key must
#                      already be embedded in CatalogTrust.EmbeddedPublicKeyBase64
#                      in oleksandrmaslov/iskra.
#
# To populate:
#   cat ~/.claude/projects/.../catalog-key.priv | gh secret set CATALOG_PRIV_KEY \
#       --repo oleksandrmaslov/iskra-catalog
#
# Also recommended:
#   ISKRA_BOT_TOKEN    A GitHub PAT (or use the default GITHUB_TOKEN if all
#                      firmware repos are public). Used to list & download
#                      target.json from each firmware repo. Defaults to
#                      GITHUB_TOKEN which has cross-repo read on public repos.

name: regenerate catalog

on:
  repository_dispatch:
    types: [firmware-released]
  workflow_dispatch: {}      # manual "Run workflow" button as a backup

permissions:
  contents: write            # we publish a new release here

env:
  OWNER: oleksandrmaslov
  ISKRA_APP_REF: main        # branch/tag of iskra-app to use the generator from

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout iskra-catalog
        uses: actions/checkout@v4

      - name: Checkout iskra-app (for Iskra.Cli source)
        uses: actions/checkout@v4
        with:
          repository: oleksandrmaslov/iskra
          ref: ${{ env.ISKRA_APP_REF }}
          path: iskra-app

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Iskra.Cli
        run: dotnet restore iskra-app/src/Iskra.Cli/Iskra.Cli.csproj

      - name: List *-firmware repos under ${{ env.OWNER }}
        id: list_repos
        env:
          GH_TOKEN: ${{ secrets.ISKRA_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh repo list "$OWNER" --limit 200 \
              --json name,isArchived,visibility \
              --jq '.[] | select(.isArchived == false) | select(.name | endswith("-firmware")) | .name' \
              > repos.txt
          echo "Found $(wc -l < repos.txt) firmware repo(s):"
          cat repos.txt

      - name: Pull target.json from each firmware repo's latest release
        env:
          GH_TOKEN: ${{ secrets.ISKRA_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p targets
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            product="${repo%-firmware}"
            # Walk all non-draft, non-prerelease releases
            gh release list -R "$OWNER/$repo" --limit 50 --json tagName,isDraft,isPrerelease \
              --jq '.[] | select(.isDraft == false) | .tagName' > tags.txt || true
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              dir="targets/${product}/${tag}"
              mkdir -p "$dir"
              if gh release download "$tag" -R "$OWNER/$repo" -p 'target.json' -D "$dir" 2>/dev/null; then
                echo "  ✓ ${product}/${tag}"
              else
                echo "  · ${product}/${tag} — no target.json asset, skipping"
                rm -rf "$dir"
              fi
            done < tags.txt
          done < repos.txt
          echo "Staged target.json files:"
          find targets -name target.json -print

      - name: Generate catalog.json
        run: |
          set -euo pipefail
          # --strict-tag-match: refuse to build if any target.json's version
          # field disagrees with its release tag directory (catches stale
          # assets re-uploaded onto a bumped tag — see iskra CLAUDE.md).
          # --revoked: optional sidecar (revoked.json at the iskra-catalog
          # repo root) listing { product_id, version, reason } entries. The
          # signed catalog carries this list; the app refuses to flash any
          # listed release. Maintained by hand by the catalog owner.
          REVOKED_ARGS=""
          if [ -f revoked.json ]; then
            REVOKED_ARGS="--revoked revoked.json"
            echo "Including revocation list from revoked.json"
          fi
          dotnet run --project iskra-app/src/Iskra.Cli --no-restore \
            -- --generate-catalog \
               --from-targets targets \
               --out catalog.json \
               --owner "$OWNER" \
               --strict-tag-match \
               $REVOKED_ARGS
          ls -la catalog.json
          cat catalog.json | head -50

      - name: Sign catalog.json
        env:
          PRIV_B64: ${{ secrets.CATALOG_PRIV_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${PRIV_B64:-}" ]; then
            echo "::error::CATALOG_PRIV_KEY secret is not set" >&2
            exit 1
          fi
          echo "$PRIV_B64" > catalog-key.priv
          dotnet run --project iskra-app/src/Iskra.Cli --no-restore \
            -- --sign-catalog catalog.json --private-key catalog-key.priv
          rm -f catalog-key.priv
          ls -la catalog.json.sig

      - name: Compute next release tag (UTC date+seq)
        id: tag
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d-%H%M%S)
          TAG="catalog-${DATE}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish as a new GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOTES="Auto-generated catalog ($(date -u +%FT%TZ)).\n\nSource event: ${{ github.event_name }}"
          gh release create "${{ steps.tag.outputs.tag }}" \
              --title "Iskra catalog ${{ steps.tag.outputs.tag }}" \
              --notes "$NOTES" \
              --latest \
              catalog.json catalog.json.sig
